name: Render DWI News Page

on:
  schedule:
    - cron: "0 */12 * * *"   # every 12 hours
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      # ----------------------------
      # CHECKOUT
      # ----------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # ----------------------------
      # SET UP R
      # ----------------------------
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.2"

      # ----------------------------
      # R DEPENDENCIES (ONLY WHAT YOU NEED)
      # ----------------------------
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          packages: |
            tidyRSS
            dplyr
            stringr
            quarto

      # ----------------------------
      # SET UP QUARTO
      # ----------------------------
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.42"

      # ----------------------------
      # RENDER ONLY THIS FILE
      # ----------------------------
      - name: Render DWI News page
        run: quarto render dwi_news.qmd

      # ----------------------------
      # ENSURE CNAME EXISTS
      # ----------------------------
      - name: Ensure custom domain CNAME exists
        run: |
          echo www.epcrimelab.org > docs/CNAME

      # ----------------------------
      # COMMIT ONLY THE OUTPUT FILE
      # ----------------------------
      - name: Commit updated page
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add docs/dwi_news.html docs/CNAME

          git commit -m "Update DWI news page" || echo "No changes to commit"
          git push