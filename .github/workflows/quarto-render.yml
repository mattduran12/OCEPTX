name: Render Quarto Site

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ----------------------------
      # SET UP R (PROPER WAY)
      # ----------------------------
      - name: Set up R
        uses: r-lib/actions/setup-r@v2

      # ----------------------------
      # INSTALL R PACKAGES (FIXED)
      # ----------------------------
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
              reactable
              DT
              gt
              quarto
              rsconnect
              shiny
              dplyr
              lubridate
              ggplot2
              plotly
              stringr
              readr
              tidyverse
              leaflet
              leaflet.extras

      # ----------------------------
      # INSTALL QUARTO
      # ----------------------------
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      # ----------------------------
      # RENDER SITE
      # ----------------------------
      - name: Render site
        run: quarto render

      # ----------------------------
      # COMMIT OUTPUT
      # ----------------------------
      - name: Commit updated /docs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs
          git commit -m "Auto site update" || echo "No changes"
          git push