name: Render Quarto Site

on:
  schedule:
    - cron: "0 0 * * *"   # once per day
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ----------------------------
      # SET UP R (PINNED VERSION)
      # ----------------------------
      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.4.2"

      # ----------------------------
      # INSTALL R DEPENDENCIES (CACHED + LOCKED)
      # ----------------------------
      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          lockfile-create: true
          packages: |
              reactable
              DT
              gt
              quarto
              rsconnect
              shiny
              dplyr
              lubridate
              ggplot2
              plotly
              stringr
              readr
              tidyverse
              leaflet
              leaflet.extras
              tidyRSS

      # ----------------------------
      # INSTALL QUARTO (PINNED VERSION)
      # ----------------------------
      - name: Install Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.6.42"

      # ----------------------------
      # RENDER SITE
      # ----------------------------
      - name: Render site
        run: quarto render

      # ----------------------------
      # FORCE CNAME (CRITICAL FIX)
      # ----------------------------
      - name: Ensure custom domain CNAME exists
        run: |
          echo www.epcrimelab.org > docs/CNAME

      # ----------------------------
      # COMMIT & DEPLOY
      # ----------------------------
      - name: Commit updated /docs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add docs
          git commit -m "Auto site update" || echo "No changes"
          git push